# Fly.io app configuration
# - Set your app name: `fly apps create <name>` then update `app = "<name>"`
# - Deploy: `fly deploy`

app = "property-shared"
primary_region = "lhr"  # London - best for UK council sites

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

# Planning scraper needs more memory for Playwright/Chromium
[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # Longer timeout for planning scrapes (can take 30-60s)
  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/v1/health"

