[project]
name = "property-shared"
version = "0.1.0"
description = "Shared property tooling: core Python library plus FastAPI wrapper."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.128.0",
  "uvicorn>=0.40.0",
  "pydantic>=2.12.5",
  "pydantic-settings>=2.12.0",
  "httpx>=0.28.1",
  "requests>=2.32.5",
  "tenacity>=9.1.2",
  "beautifulsoup4>=4.14.3",
  "pytest>=9.0.2",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "openapi-python-client>=0.28.1",
]

[build-system]
requires = ["hatchling>=1.26.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["property_core", "app"]

[tool.pytest.ini_options]
addopts = "-ra"
